name: osdm_skp_filler
description: Aplikasi Desktop Windows untuk mengisi Log Harian SKP OSDM Kemdikti Saintek
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  dio_cookie_manager: ^1.0.0
  cookie_jar: ^1.0.1
  flutter_bloc: ^8.1.3
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.3.3
  encrypt: ^5.0.3
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
